services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: recipes-todoist
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_PATH: /app/data/recipes.db
      TODOIST_API_TOKEN: ${TODOIST_API_TOKEN:-}
      TODOIST_PROJECT_ID: ${TODOIST_PROJECT_ID:-}
      TODOIST_PROJECT: ${TODOIST_PROJECT:-}
      TODOIST_API_BASE_URL: ${TODOIST_API_BASE_URL:-https://api.todoist.com/api/v1}
      BASE_URL: ${BASE_URL:-}
      LOCAL_IP: ${LOCAL_IP:-}
    volumes:
      - data:/app/data
      - uploads_data:/app/uploads

volumes:
  data:
  uploads_data:
